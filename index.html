<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Goals</title>
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎯%3C/text%3E%3C/svg%3E">

<style>
  :root{
    --bg:#0b1020; --card:#161c33; --card2:#1e2645; --text:#eef1ff; --muted:#9aa3c7;
    --track:#2a3358; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f2f4fb; --card:#ffffff; --card2:#f6f8ff; --text:#141a33; --muted:#6b7392;
           --track:#e6e9f5; --shadow:0 10px 30px rgba(20,26,51,.08); }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    max-width:520px; margin-inline:auto;
  }
  header{ display:flex; align-items:baseline; justify-content:space-between; margin:8px 2px 6px; }
  header h1{ font-size:24px; margin:0; letter-spacing:-.02em; }
  header .date{ color:var(--muted); font-size:14px; }
  .sync{ display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px; margin:0 2px 18px; }
  .sync .dot{ width:8px; height:8px; border-radius:50%; background:#34d399; }
  .sync[data-state="offline"] .dot{ background:#fb923c; }
  .sync[data-state="syncing"] .dot{ background:#9aa3c7; }

  .card{
    background:var(--card); border-radius:22px; padding:18px; margin-bottom:16px;
    box-shadow:var(--shadow); display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:center;
  }
  .ring{
    --pct:0; width:92px; height:92px; border-radius:50%; flex:none;
    background:conic-gradient(var(--accent) calc(var(--pct)*1%), var(--track) 0);
    display:grid; place-items:center; transition:background .35s ease;
  }
  .ring .hole{
    width:72px; height:72px; border-radius:50%; background:var(--card);
    display:grid; place-items:center; text-align:center; line-height:1;
  }
  .ring .val{ font-size:22px; font-weight:700; letter-spacing:-.02em; }
  .ring .unit{ font-size:11px; color:var(--muted); margin-top:2px; }
  .ring.done .hole{ box-shadow:inset 0 0 0 2px var(--accent); }

  .body{ min-width:0; }
  .titlerow{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .titlerow h2{ font-size:17px; margin:0; }
  .goal{ background:none; border:0; color:var(--muted); font-size:13px; padding:4px 6px; border-radius:8px; cursor:pointer; }
  .goal:active{ background:var(--card2); }

  .quick{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .quick button{
    border:0; border-radius:12px; padding:9px 12px; font-size:14px; font-weight:600; cursor:pointer;
    color:var(--accent); background:color-mix(in srgb, var(--accent) 16%, transparent);
  }
  .quick button:active{ transform:scale(.95); }

  .custom{ display:flex; gap:8px; margin-top:10px; }
  .custom input{
    flex:1; min-width:0; border:1px solid var(--track); background:var(--card2); color:var(--text);
    border-radius:12px; padding:9px 12px; font-size:15px;
  }
  .custom .add{ border:0; border-radius:12px; padding:0 16px; font-weight:700; cursor:pointer;
    color:#fff; background:var(--accent); }
  .custom .undo{ border:1px solid var(--track); background:var(--card2); color:var(--muted);
    border-radius:12px; padding:0 12px; font-size:16px; cursor:pointer; }
  .custom button:active{ transform:scale(.95); }

  details.devices{ background:var(--card); border-radius:16px; padding:12px 16px; box-shadow:var(--shadow); }
  details.devices summary{ cursor:pointer; color:var(--muted); font-size:14px; }
  details.devices .row{ display:flex; gap:8px; margin-top:10px; }
  details.devices input{ flex:1; min-width:0; border:1px solid var(--track); background:var(--card2);
    color:var(--text); border-radius:10px; padding:8px 10px; font-size:13px; }
  details.devices button{ border:0; border-radius:10px; padding:0 12px; font-weight:600; cursor:pointer;
    color:#fff; background:#38bdf8; }
  details.devices p{ color:var(--muted); font-size:12px; margin:8px 0 2px; }

  .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .topbar button{ border:0; background:var(--card2); color:var(--text); border-radius:12px;
    padding:9px 14px; font-size:14px; font-weight:600; cursor:pointer; }
  .topbar button:active{ transform:scale(.96); }
  .topbar strong{ font-size:16px; }
  .hday{ background:var(--card); border-radius:18px; padding:14px 16px; margin-bottom:14px; box-shadow:var(--shadow); }
  .hhead{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:6px; }
  .hhead h3{ font-size:15px; margin:0; }
  .hsum{ font-size:12px; color:var(--muted); text-align:right; }
  .hrow{ display:grid; grid-template-columns:auto 1fr auto auto; gap:10px; align-items:center;
    padding:8px 0; border-top:1px solid var(--track); }
  .htime{ color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .hlabel{ font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hamt{ font-weight:600; font-size:14px; font-variant-numeric:tabular-nums; }
  .hdel{ border:0; background:none; color:var(--muted); font-size:15px; cursor:pointer; padding:4px 8px; border-radius:8px; }
  .hdel:active{ background:var(--card2); color:#f87171; }
  .empty{ color:var(--muted); text-align:center; margin-top:36px; }

  details.yesterday{ background:var(--card); border-radius:22px; padding:4px 18px 12px; box-shadow:var(--shadow); margin-bottom:16px; }
  details.yesterday>summary{ cursor:pointer; color:var(--text); font-size:15px; font-weight:600; padding:14px 0; list-style:none; }
  details.yesterday>summary::-webkit-details-marker{ display:none; }
  details.yesterday>summary::before{ content:'▸'; color:var(--muted); margin-right:8px; }
  details.yesterday[open]>summary::before{ content:'▾'; }
  .ycard{ border-top:1px solid var(--track); padding:12px 0; --accent:#38bdf8; }
  .yhead{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .yname{ font-size:15px; font-weight:600; }
  .yamt{ font-size:14px; color:var(--muted); font-variant-numeric:tabular-nums; }
  footer{ text-align:center; color:var(--muted); font-size:12px; margin-top:14px; }
</style>

<header>
  <h1>Daily Goals</h1>
  <span class="date" id="date"></span>
</header>
<div class="sync" id="sync" data-state="syncing"><span class="dot"></span><span id="syncText">connecting…</span></div>

<main id="app"></main>

<details class="devices">
  <summary>🔗 Sync across devices</summary>
  <p>This device's sync code — paste it on another device to see the same data:</p>
  <div class="row">
    <input id="myCode" readonly>
    <button onclick="copyCode()">Copy</button>
  </div>
  <p>Load another device's data (paste its code):</p>
  <div class="row">
    <input id="otherCode" placeholder="paste sync code">
    <button onclick="useCode()">Use</button>
  </div>
</details>
<footer>Synced to the cloud · tap a goal to change it</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL  = 'https://hpzjieftfscvppwklqjf.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwemppZWZ0ZnNjdnBwd2tscWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTAzOTUsImV4cCI6MjA5OTc2NjM5NX0.3sCfKfaTWKapnq3Xms11BmS7x8NuCmRGJyhmgcauhds';
const sb = createClient(SB_URL, SB_ANON, { auth:{ persistSession:false } });

// ── Trackers. Add another (e.g. weed weekly) by adding one object here. ──────
const TRACKERS = [
  { id:'water',   emoji:'💧', name:'Water',   unit:'ml',       period:'day',  goal:3000, accent:'#38bdf8',
    quick:[['Cup',250],['Bottle',700],['Whey shake',400]] },
  { id:'protein', emoji:'🍗', name:'Protein', unit:'g',        period:'day',  goal:150,  accent:'#fb923c',
    quick:[['+20',20],['+30',30],['+40',40]] },
  { id:'gym',     emoji:'🏋️', name:'Gym',     unit:'sessions', period:'week', goal:4,    accent:'#34d399',
    quick:[['+1 session',1]] },
  { id:'dailyf',  emoji:'🅵',  name:'weekly F', unit:'times',    period:'week', goal:3,    accent:'#a78bfa',
    quick:[['+1',1]] },
  { id:'weeklyw', emoji:'🆆',  name:'weekly W', unit:'times',    period:'week', goal:3,    accent:'#22c55e',
    quick:[['+1',1]] },
];

// ── Storage: localStorage = instant/offline cache, Supabase = source of truth ─
const LKEY = 'daily-goals-v1';
let vaultId = localStorage.getItem('daily-goals-vault');
if(!vaultId){ vaultId = crypto.randomUUID(); localStorage.setItem('daily-goals-vault', vaultId); }

const blank = () => ({ goals:{}, entries:[], updatedAt:0 });   // entries: [{id,t,a,d}] — ponytail: never pruned
let data = readLocal();
let view = 'home';                                             // 'home' | 'history'
let yOpen = false;                                            // keep the Yesterday panel open across re-renders
function normalize(){ for(const e of data.entries) if(!e.id) e.id = crypto.randomUUID(); }  // backfill ids for delete-by-id

function readLocal(){ try{ return JSON.parse(localStorage.getItem(LKEY)) || blank(); }catch{ return blank(); } }
function writeLocal(){ localStorage.setItem(LKEY, JSON.stringify(data)); }

function setSync(state, text){ const el=document.getElementById('sync');
  el.dataset.state=state; document.getElementById('syncText').textContent=text; }

async function pull(){
  const { data:remote, error } = await sb.rpc('get_vault', { p_id: vaultId });
  if(error){ setSync('offline','offline — saved on this device'); return undefined; }
  return remote;                                   // blob object, or null if new vault
}
async function push(){
  setSync('syncing','saving…');
  const { error } = await sb.rpc('save_vault',
    { p_id: vaultId, p_data: data, p_updated: new Date(data.updatedAt).toISOString() });
  setSync(error?'offline':'synced', error?'offline — will sync later':'synced');
}
function touchSave(){ data.updatedAt = Date.now(); writeLocal(); render(); push(); }

// ── Date bucketing ──────────────────────────────────────────────────────────
function dayKey(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function weekKey(d){                        // week = Sunday–Saturday; key = that week's Sunday date
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() - x.getDay());      // getDay(): Sun=0 → step back to the week's Sunday
  return 'W' + dayKey(x);
}
const keyOf   = (t,d) => t.period==='week' ? weekKey(d) : dayKey(d);
const goalOf  = t => data.goals[t.id] ?? t.goal;
const inNow   = (e,t) => keyOf(t,new Date(e.d)) === keyOf(t,new Date());
const totalOf = t => data.entries.filter(e => e.t===t.id && inNow(e,t)).reduce((s,e)=>s+e.a,0);

// ── Actions (exposed for inline onclick) ─────────────────────────────────────
window.add = (t, amt) => { if(!amt) return; data.entries.push({id:crypto.randomUUID(), t:t.id, a:amt, d:new Date().toISOString()}); touchSave(); };
window.undo = t => {
  for(let i=data.entries.length-1; i>=0; i--)
    if(data.entries[i].t===t.id && inNow(data.entries[i],t)){ data.entries.splice(i,1); break; }
  touchSave();
};

// ── Yesterday editing: log/undo entries dated to the previous calendar day ────
function yesterdayDate(){ const d=new Date(); d.setDate(d.getDate()-1); return d; }
const onDay    = (e,d) => dayKey(new Date(e.d)) === dayKey(d);
const dayTotal = (id,d) => data.entries.filter(e=>e.t===id && onDay(e,d)).reduce((s,e)=>s+e.a,0);
const plur = (n,u) => (Math.abs(n)===1 && u.endsWith('s')) ? u.slice(0,-1) : u;   // 1 session, 2 sessions
window.addYesterday = (t, amt) => { if(!amt) return; const d=yesterdayDate(); d.setHours(12,0,0,0);
  data.entries.push({id:crypto.randomUUID(), t:t.id, a:amt, d:d.toISOString()}); touchSave(); };
window.undoYesterday = t => { const y=yesterdayDate();
  for(let i=data.entries.length-1; i>=0; i--)
    if(data.entries[i].t===t.id && onDay(data.entries[i],y)){ data.entries.splice(i,1); break; }
  touchSave();
};
window.__yToggle = v => { yOpen = v; };
window.editGoal = t => {
  const v = prompt(`Goal for ${t.name} (${t.unit} per ${t.period}):`, goalOf(t));
  if(v!==null && !isNaN(+v) && +v>0){ data.goals[t.id]=+v; touchSave(); }
};
window.TRACKERS = TRACKERS;

window.copyCode = () => { const el=document.getElementById('myCode'); el.select();
  navigator.clipboard?.writeText(el.value); };
window.useCode = async () => {
  const v = document.getElementById('otherCode').value.trim();
  if(!v || v===vaultId) return;
  vaultId = v; localStorage.setItem('daily-goals-vault', v);
  await boot(); document.getElementById('otherCode').value='';
};

window.showHistory = () => { view='history'; render(); scrollTo(0,0); };
window.showHome    = () => { view='home';    render(); scrollTo(0,0); };
window.delEntry    = id => { data.entries = data.entries.filter(e => e.id!==id); touchSave(); };

// ── Render ──────────────────────────────────────────────────────────────────
function render(){
  normalize();
  document.getElementById('date').textContent =
    new Date().toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
  document.getElementById('myCode').value = vaultId;
  const hide = view==='history';
  document.querySelector('details.devices').style.display = hide ? 'none' : '';
  document.querySelector('footer').style.display          = hide ? 'none' : '';
  document.getElementById('app').innerHTML = hide ? historyHTML() : homeHTML();
}

function homeHTML(){
  const cards = TRACKERS.map((t,i)=>{
    const cur = totalOf(t), g = goalOf(t), pct = Math.min(100, g? cur/g*100 : 0), done = cur>=g;
    const val = Number.isInteger(cur)? cur : cur.toFixed(0);
    return `<div class="card" style="--accent:${t.accent}">
      <div class="ring ${done?'done':''}" style="--pct:${pct}">
        <div class="hole"><div><div class="val">${val}${done?' ✓':''}</div><div class="unit">${t.unit}</div></div></div>
      </div>
      <div class="body">
        <div class="titlerow">
          <h2>${t.emoji} ${t.name}</h2>
          <button class="goal" onclick="editGoal(TRACKERS[${i}])">goal ${g} ${t.unit} ✎</button>
        </div>
        <div class="quick">
          ${t.quick.map(([label,amt])=>`<button onclick="add(TRACKERS[${i}],${amt})">${label}</button>`).join('')}
        </div>
        <div class="custom">
          <input type="number" inputmode="decimal" placeholder="custom ${t.unit}" id="in-${t.id}">
          <button class="add" onclick="const el=document.getElementById('in-${t.id}');add(TRACKERS[${i}],+el.value);el.value=''">Add</button>
          <button class="undo" title="Undo last" onclick="undo(TRACKERS[${i}])">↩</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const y = yesterdayDate();
  const yLabel = y.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
  const yRows = TRACKERS.map((t,i)=>{
    const amt = dayTotal(t.id, y), val = Number.isInteger(amt)? amt : amt.toFixed(0);
    return `<div class="ycard" style="--accent:${t.accent}">
      <div class="yhead"><span class="yname">${t.emoji} ${t.name}</span><span class="yamt">${val} ${plur(amt,t.unit)}</span></div>
      <div class="quick">
        ${t.quick.map(([label,a])=>`<button onclick="addYesterday(TRACKERS[${i}],${a})">${label}</button>`).join('')}
      </div>
      <div class="custom">
        <input type="number" inputmode="decimal" placeholder="custom ${t.unit}" id="yin-${t.id}">
        <button class="add" onclick="const el=document.getElementById('yin-${t.id}');addYesterday(TRACKERS[${i}],+el.value);el.value=''">Add</button>
        <button class="undo" title="Undo yesterday's last" onclick="undoYesterday(TRACKERS[${i}])">↩</button>
      </div>
    </div>`;
  }).join('');
  const yPanel = `<details class="yesterday" ${yOpen?'open':''} ontoggle="__yToggle(this.open)">
    <summary>Yesterday · ${yLabel}</summary>${yRows}</details>`;

  return `<div class="topbar"><button onclick="showHistory()">📜 History</button></div>` + cards + yPanel;
}

function friendlyDay(d){
  const today=new Date(), yest=new Date(); yest.setDate(today.getDate()-1);
  if(dayKey(d)===dayKey(today)) return 'Today';
  if(dayKey(d)===dayKey(yest))  return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
}

function historyHTML(){
  const sorted = [...data.entries].sort((a,b)=> new Date(b.d) - new Date(a.d));
  const byDay = {};
  for(const e of sorted){ const k = dayKey(new Date(e.d)); (byDay[k] ??= []).push(e); }
  const days = Object.keys(byDay);
  const body = days.length ? days.map(k=>{
    const list = byDay[k];
    const summary = TRACKERS.map(t=>{
      const s = list.filter(e=>e.t===t.id).reduce((a,e)=>a+e.a,0);
      if(!s) return null;
      return `${t.emoji} ${s} ${plur(s,t.unit)}`;
    }).filter(Boolean).join(' · ');
    const rows = list.map(e=>{
      const t = TRACKERS.find(x=>x.id===e.t) || {emoji:'•', name:e.t, unit:''};
      const time = new Date(e.d).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      const unit = plur(e.a, t.unit);
      return `<div class="hrow">
        <span class="htime">${time}</span>
        <span class="hlabel">${t.emoji} ${t.name}</span>
        <span class="hamt">${e.a>0?'+':''}${e.a} ${unit}</span>
        <button class="hdel" title="Delete" onclick="delEntry('${e.id}')">✕</button>
      </div>`;
    }).join('');
    return `<div class="hday"><div class="hhead"><h3>${friendlyDay(new Date(list[0].d))}</h3><span class="hsum">${summary}</span></div>${rows}</div>`;
  }).join('') : '<p class="empty">No entries yet — add something on the home screen.</p>';
  return `<div class="topbar"><button onclick="showHome()">← Back</button><strong>History</strong></div>` + body;
}

// ── Boot: show cached data instantly, then reconcile with cloud (newest wins) ─
async function boot(){
  data = readLocal(); render();
  const remote = await pull();
  if(remote === undefined) return;                 // offline: keep local, indicator already set
  if(remote && (remote.updatedAt||0) >= (data.updatedAt||0)){
    data = remote; writeLocal(); render();         // cloud is newer (or equal) → adopt it
    setSync('synced','synced');
  } else if((data.updatedAt||0) > (remote?.updatedAt||0)){
    setSync('synced','synced'); push();            // local is newer → heal the cloud
  } else {
    setSync('synced','synced');                    // both empty
  }
}
boot();

// ── Self-check: open with #test (date bucketing is the one tricky bit) ────────
if(location.hash==='#test'){
  console.assert(dayKey(new Date(2026,6,16))==='2026-7-16','dayKey');
  console.assert(weekKey(new Date(2026,0,4))===weekKey(new Date(2026,0,5)),'Sun+Mon same week'); // Jan 4 Sun, 5 Mon
  console.assert(weekKey(new Date(2026,0,3))!==weekKey(new Date(2026,0,4)),'week rolls Sunday');  // Jan 3 Sat, 4 Sun
  console.log('self-check passed');
}
</script>
